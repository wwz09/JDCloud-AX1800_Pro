name: 编译 WRT
run-name: 编译 - ${{ inputs.model }}

on:
  workflow_dispatch:
    inputs:
      model:
        required: true
        description: 设备型号
        type: choice
        default: jdcloud_ipq60xx_immwrt
        options:  
          - cmcc_rax3000m_immwrt  
          - jdcloud_ipq60xx_immwrt
          - jdcloud_ipq60xx_libwrt
          - qihoo_360v6_immwrt  
          - zn_m2_immwrt
          - zn_m2_libwrt
          - x64_immwrt

env:
  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

jobs:
  build:
    strategy:
      matrix:
        os: [ubuntu-24.04]
    runs-on: ${{ matrix.os }}

    steps:
      - name: 释放磁盘空间
        uses: sbwml/actions@free-disk

      - name: 构建系统设置
        run: |
          sudo bash -c 'bash <(curl -sL https://build-scripts.immortalwrt.org/init_build_environment.sh)'
          sudo -E apt -yqq install dos2unix
          sudo -E apt -yqq install libfuse-dev
          sudo -E apt -yqq autoremove --purge
          sudo -E apt -yqq autoclean
          sudo -E apt -yqq clean
          sudo -E systemctl daemon-reload

      - name: 检出代码
        uses: actions/checkout@v6.0.2

      - name: 设置构建日期和时区
        run: |
          sudo -E timedatectl set-timezone "Asia/Shanghai"
          export BUILD_DATE=$(TZ=UTC-8 date +"%y.%m.%d_%H.%M.%S")
          echo "BUILD_DATE=$BUILD_DATE" >> $GITHUB_ENV

      - name: 安装 yq
        run: sudo apt-get install -y yq

      - name: 读取发布配置
        run: |
          # 读取配置文件
          if [ -f "release_config.yml" ]; then
            export SOURCE_CODE=$(yq e '.release.source_code' release_config.yml)
            export KERNEL_VERSION=$(yq e '.release.kernel_version' release_config.yml)
            export WIFI_PASSWORD=$(yq e '.release.wifi_password' release_config.yml)
            export LAN_ADDRESS=$(yq e '.release.lan_address' release_config.yml)
            export PLUGINS=$(yq e '.release.plugins[]' release_config.yml | tr '\n' '\n            ')
            
            # 设置环境变量
            echo "SOURCE_CODE=$SOURCE_CODE" >> $GITHUB_ENV
            echo "KERNEL_VERSION=$KERNEL_VERSION" >> $GITHUB_ENV
            echo "WIFI_PASSWORD=$WIFI_PASSWORD" >> $GITHUB_ENV
            echo "LAN_ADDRESS=$LAN_ADDRESS" >> $GITHUB_ENV
            echo "PLUGINS=$PLUGINS" >> $GITHUB_ENV
          else
            # 使用默认值
            echo "SOURCE_CODE=https://github.com/immortalwrt/immortalwrt.git" >> $GITHUB_ENV
            echo "KERNEL_VERSION=6.6.126" >> $GITHUB_ENV
            echo "WIFI_PASSWORD=12345678" >> $GITHUB_ENV
            echo "LAN_ADDRESS=192.168.1.1" >> $GITHUB_ENV
            echo "PLUGINS=luci-app-adguardhome\n            luci-app-argon-config\n            luci-app-autoreboot\n            luci-app-firewall\n            luci-app-homerproxy\n            luci-app-istorex\n            luci-app-lucky\n            luci-app-package-manager\n            luci-app-quickstart\n            luci-app-samba4\n            luci-app-smartdns\n            luci-app-store\n            luci-app-tyd\n            luci-app-upnp\n            luci-app-vlmcsd\n            luci-app-wol" >> $GITHUB_ENV
          fi

      - name: 预克隆
        run: ./wrt_core/pre_clone_action.sh ${{ inputs.model }}

      - name: 缓存依赖
        uses: actions/cache@v5.0.2
        with:
          path: |
            ./action_build/.ccache
            ./action_build/staging_dir
          key: ${{ matrix.os }}-${{ hashFiles('**/repo_flag') }}-${{ env.BUILD_DATE }}
          restore-keys: |
            ${{ matrix.os }}-${{ hashFiles('**/repo_flag') }}-

      - name: 刷新缓存
        run: |
          if [ -d "./action_build/staging_dir" ]; then
            find "./action_build/staging_dir" -type d -name "stamp" -not -path "*target*" | while read -r dir; do
                find "$dir" -type f -exec touch {} +
            done
          fi

      - name: 编译固件
        run: ./build.sh ${{ inputs.model }}

      - name: 删除旧缓存
        run: |
          # 获取缓存列表并删除
          gh cache list --key ${{ matrix.os }}-${{ hashFiles('**/repo_flag') }}- --json key --jq '.[] | .key' | while read -r key; do
            gh cache delete "$key"
          done
          # 输出缓存状态
          echo "========缓存状态========"
          echo "ccache: $(du -sh ./action_build/.ccache | cut -f 1)"
          echo "staging: $(du -sh ./action_build/staging_dir | cut -f 1)"

      - name: 机器信息
        run: |
          echo "=============================================="
          lscpu | grep -E "name|Core|Thread"
          echo "=============================================="
          df -h
          echo "=============================================="

      - name: 上传固件
        uses: actions/upload-artifact@v6
        with:
          name: ${{ env.BUILD_DATE }}_${{ inputs.model }}
          path: ./firmware/*.*

      - name: 创建 GitHub 发布
        uses: ncipollo/release-action@v1
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          tag: v${{ env.BUILD_DATE }}_${{ inputs.model }}
          name: 固件 ${{ inputs.model }} - ${{ env.BUILD_DATE }}
          body: |
            云编译发布
            源码: ${{ env.SOURCE_CODE }}
            内核: ${{ env.KERNEL_VERSION }}
            WiFi密码: ${{ env.WIFI_PASSWORD }}
            LAN地址: ${{ env.LAN_ADDRESS }}
            插件:
            ${{ env.PLUGINS }}
          artifacts: ./firmware/*.*
          draft: false
          prerelease: false
          allowUpdates: true
